<!-- ============================================
     VINX, KEN & ZYNTRI STUDIO
     CineStream — Premium Movie Streaming Platform
     ============================================ -->
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CineStream — Watch Movies Free | Premium Streaming</title>
  <meta name="description" content="Stream the latest movies for free. No signup required.">
  <meta name="theme-color" content="#0a0a0a">
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23e50914'/><text x='16' y='22' font-size='18' font-weight='bold' text-anchor='middle' fill='white'>C</text></svg>">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/home.css">
</head>

<body>

  <!-- Maintenance Overlay -->
  <div class="maintenance-overlay" id="maintenanceOverlay" style="display:none">
    <div class="maintenance-overlay__card">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        style="width:48px;height:48px;color:var(--accent-red);margin-bottom:var(--space-lg)">
        <circle cx="12" cy="12" r="3" />
        <path
          d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" />
      </svg>
      <h1 style="font-size:var(--fs-2xl);margin-bottom:var(--space-sm)">Under Maintenance</h1>
      <p id="maintenanceMsg" style="color:var(--text-secondary)">We are currently performing maintenance.</p>
    </div>
  </div>

  <!-- Announcement Banner -->
  <div class="announcement-bar" id="announcementBar" style="display:none">
    <p id="announcementMsg"></p>
    <button class="announcement-bar__close"
      onclick="document.getElementById('announcementBar').style.display='none'">✕</button>
  </div>

  <!-- Navbar -->
  <nav class="navbar" id="navbar">
    <a href="index.html" class="navbar__logo" id="navLogo">
      <span class="navbar__logo-icon">C</span>
      <span class="navbar__logo-text">Cine<span class="navbar__logo-accent">Stream</span></span>
    </a>
    <div class="navbar__actions">
      <button class="btn-icon" id="searchBtn" aria-label="Search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8" />
          <path d="m21 21-4.35-4.35" />
        </svg>
      </button>
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
        <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
        </svg>
        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="5" />
          <path
            d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" />
        </svg>
      </button>
      <a href="admin.html" class="navbar__admin-link" title="Admin">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="11" width="18" height="11" rx="2" />
          <path d="M7 11V7a5 5 0 0 1 10 0v4" />
        </svg>
      </a>
    </div>
  </nav>

  <!-- Search Overlay -->
  <div class="search-overlay" id="searchOverlay">
    <button class="btn-icon search-overlay__close" id="searchClose">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M18 6 6 18M6 6l12 12" />
      </svg>
    </button>
    <div class="search-overlay__input-wrap">
      <span class="search-overlay__icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8" />
          <path d="m21 21-4.35-4.35" />
        </svg></span>
      <input type="text" class="search-overlay__input" id="searchInput" placeholder="Search movies..."
        autocomplete="off">
    </div>
    <div class="search-results" id="searchResults"></div>
  </div>

  <!-- Hero Banner (dynamic) -->
  <section class="hero" id="heroBanner">
    <div class="hero__slides" id="heroSlides"></div>
    <div class="hero__dots" id="heroDots"></div>
  </section>

  <!-- OTT Platform Filter -->
  <section class="ott-filter-bar" id="ottFilterBar">
    <div class="ott-filter-bar__inner">
      <div class="ott-filter-bar__strip" id="ottStrip"></div>
    </div>
  </section>

  <!-- OTT Filtered Results -->
  <section class="ott-results" id="ottFilterSection" style="display:none"></section>

  <!-- Dynamic Sections (rendered from admin config) -->
  <div class="categories-wrap" id="categoriesWrap"></div>

  <!-- Footer (dynamic) -->
  <footer class="site-footer" id="siteFooter">
    <div class="site-footer__links" id="footerLinks"></div>
    <p class="site-footer__text" id="footerText"></p>
  </footer>

  <!-- Bottom Navigation (Mobile) -->
  <nav class="bottom-nav" id="bottomNav">
    <button class="bottom-nav__item active" data-page="home">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
        <polyline points="9 22 9 12 15 12 15 22" />
      </svg>
      <span class="bottom-nav__label">Home</span>
    </button>
    <button class="bottom-nav__item" data-page="series">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="2" y="7" width="20" height="15" rx="2" />
        <polyline points="17 2 12 7 7 2" />
      </svg>
      <span class="bottom-nav__label">Series</span>
    </button>
    <button class="bottom-nav__item" data-page="movies">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="2" y="2" width="20" height="20" rx="2" />
        <path d="M7 2v20M17 2v20M2 12h20M2 7h5M2 17h5M17 7h5M17 17h5" />
      </svg>
      <span class="bottom-nav__label">Movies</span>
    </button>
    <button class="bottom-nav__item" data-page="categories">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="3" width="7" height="7" />
        <rect x="14" y="3" width="7" height="7" />
        <rect x="3" y="14" width="7" height="7" />
        <rect x="14" y="14" width="7" height="7" />
      </svg>
      <span class="bottom-nav__label">Categories</span>
    </button>
    <button class="bottom-nav__item" data-page="settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="3" />
        <path
          d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" />
      </svg>
      <span class="bottom-nav__label">Settings</span>
    </button>
  </nav>

  <!-- Request Movie FAB -->
  <button class="request-fab" id="requestFab" onclick="openRequestModal()" title="Request a Movie">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="22" height="22">
      <path d="M12 5v14M5 12h14" />
    </svg>
    <span>Request</span>
  </button>

  <!-- Request Movie Modal -->
  <div class="request-modal-overlay" id="requestModal">
    <div class="request-modal">
      <button class="request-modal__close" onclick="closeRequestModal()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
          <path d="M18 6 6 18M6 6l12 12" />
        </svg>
      </button>
      <div class="request-modal__header">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          style="width:28px;height:28px;color:var(--accent-red)">
          <rect x="2" y="2" width="20" height="20" rx="2" />
          <path d="M7 2v20M17 2v20M2 12h20" />
        </svg>
        <h2>Request a Movie</h2>
        <p class="request-modal__subtitle">Can't find a movie? Let us know and we'll try to add it!</p>
      </div>
      <form id="requestForm" onsubmit="submitRequest(event)" autocomplete="off">
        <!-- Honeypot (hidden anti-bot field) -->
        <div style="position:absolute;left:-9999px;opacity:0;height:0;overflow:hidden" aria-hidden="true">
          <input type="text" name="website" id="reqHoneypot" tabindex="-1" autocomplete="off">
        </div>
        <div class="request-form__group">
          <label class="request-form__label">Movie Name <span class="required">*</span></label>
          <input type="text" id="reqMovieName" class="request-form__input" placeholder="e.g. Inception" required
            minlength="3" maxlength="120">
        </div>
        <div class="request-form__row">
          <div class="request-form__group">
            <label class="request-form__label">Language</label>
            <select id="reqLanguage" class="request-form__input">
              <option value="">Select</option>
              <option>Hindi</option>
              <option>English</option>
              <option>Tamil</option>
              <option>Telugu</option>
              <option>Malayalam</option>
              <option>Kannada</option>
              <option>Bengali</option>
              <option>Marathi</option>
              <option>Punjabi</option>
              <option>Korean</option>
              <option>Japanese</option>
              <option>Other</option>
            </select>
          </div>
          <div class="request-form__group">
            <label class="request-form__label">OTT Platform</label>
            <select id="reqPlatform" class="request-form__input">
              <option value="">Any / Unknown</option>
            </select>
          </div>
        </div>
        <div class="request-form__row">
          <div class="request-form__group">
            <label class="request-form__label">Year</label>
            <input type="number" id="reqYear" class="request-form__input" placeholder="e.g. 2024" min="1900" max="2030">
          </div>
          <div class="request-form__group">
            <label class="request-form__label">Email (optional)</label>
            <input type="email" id="reqEmail" class="request-form__input" placeholder="Get notified when added">
          </div>
        </div>
        <div class="request-form__group">
          <label class="request-form__label">Additional Notes</label>
          <textarea id="reqNotes" class="request-form__input request-form__textarea"
            placeholder="Any specific details..." rows="3" maxlength="500"></textarea>
        </div>
        <div class="request-form__footer">
          <button type="submit" class="btn btn-primary request-form__submit" id="reqSubmitBtn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
              <path d="M22 2 11 13M22 2l-7 20-4-9-9-4 20-7z" />
            </svg>
            Submit Request
          </button>
          <p class="request-form__note">No login required • Max 1 request per 30 seconds</p>
        </div>
        <div class="request-form__message" id="reqMessage" style="display:none"></div>
      </form>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/home.js"></script>
</body>

</html>
